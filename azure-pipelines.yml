trigger:
  branches:
    include: [main]

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Build
    jobs:
      - job: Web
        steps:
          - task: NodeTool@0
            inputs: { versionSpec: '20.x' }
          - script: npm ci
            workingDirectory: web
            displayName: Install web deps
          - script: npm run build
            workingDirectory: web
            displayName: Build web
          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: web/dist
              ArtifactName: web

      - job: Api
        steps:
          - task: UseDotNet@2
            inputs: { version: '10.0.x' }
          - script: dotnet restore
            workingDirectory: api/FieldInspection.Api
          - script: dotnet build --configuration Release --no-restore
            workingDirectory: api/FieldInspection.Api
          - script: dotnet publish --configuration Release --output $(Build.ArtifactStagingDirectory)/api
            workingDirectory: api/FieldInspection.Api
          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: $(Build.ArtifactStagingDirectory)/api
              ArtifactName: api
